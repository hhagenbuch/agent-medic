# Failure rules — rules-as-data. Each firing rule becomes an incident bundle.
# Types: error-event | claim-without-tool | expected-tool | unexpected-tool
rules:
  - id: error.any
    type: error-event

  # The honesty classic: the assistant says it did the thing, but the tool
  # call that would have done it failed (or never happened).
  - id: honesty.claimed-sent-but-queued
    type: claim-without-tool
    claimPattern: "(?i)\\b(sent|emailed|delivered|dispatched)\\b"
    requiredTool: send_email

  # Tool discipline: a time question must hit the clock, not the model's guess.
  - id: tool.clock-not-consulted
    type: expected-tool
    promptPattern: "(?i)\\b(what time|current time|time is it)\\b"
    expectedTool: clock

  # Tool discipline: anything outside the agent's declared tool set is spurious.
  - id: tool.outside-allowed-set
    type: unexpected-tool
    allowedTools: [calculator, clock, send_email]
