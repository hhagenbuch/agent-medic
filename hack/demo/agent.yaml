# The demo patient (see hack/demo-agent/): deterministic, keyless. Its ONLY
# job is to misbehave until its prompt carries the repaired instruction.
apiVersion: agents.hhagenbuch.io/v1alpha1
kind: Agent
metadata:
  name: support-agent
  namespace: agents
spec:
  image: medic-demo-agent:0.1
  replicas: 1
  model: none-demo-stub
  apiKeySecretRef: { name: anthropic-key, key: api-key }
  activePromptVersion: support-v1
  systemPrompt: "You are a support agent. Be brief and reassuring."
  evalGate:
    datasetConfigMap: support-golden-cases
    minPassRate: "0.9"
